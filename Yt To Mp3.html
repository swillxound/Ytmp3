<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwillXound - YT to MP3</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="converter-container">
        <h1>🎵 StreamWave</h1>
        <p>Convert your favorite YouTube videos to high-quality MP3 instantly.</p>
        
        <div class="input-group">
            <input type="text" id="youtube-url" placeholder="Paste YouTube link here (e.g., https://youtu.be/...)" />
            <button id="convert-btn" onclick="startConversion()">Convert to MP3</button>
        </div>

        <!-- Status & Results Area -->
        <div id="status-box" class="hidden">
            <div class="spinner"></div>
            <p id="status-text">Processing audio track...</p>
        </div>
        
        <div id="download-box" class="hidden">
            <p class="success-text">🎉 Conversion Complete!</p>
            <a id="download-link" href="#" target="_blank" class="download-button">Download MP3</a>
        </div>
    </div>

    <script>
async function startConversion() {
    const urlInput = document.getElementById('youtube-url').value.trim();
    const statusBox = document.getElementById('status-box');
    const statusText = document.getElementById('status-text');
    const downloadBox = document.getElementById('download-box');
    const downloadLink = document.getElementById('download-link');
    
    if (!urlInput || !urlInput.includes('youtu')) {
        alert('Please paste a valid YouTube video link!');
        return;
    }

    downloadBox.classList.add('hidden');
    statusBox.classList.remove('hidden');
    statusText.innerText = "Connecting to conversion server...";

    // Extract the video ID from the YouTube URL
    let videoId = "";
    const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
    const match = urlInput.match(regExp);
    
    if (match && match[2].length === 11) {
        videoId = match[2];
    } else {
        statusBox.classList.add('hidden');
        alert('Could not parse the YouTube Video ID. Please check the link.');
        return;
    }

    // Using a different stable public MP3 API gateway
    const apiUrl = `https://youtube-mp36.p.rapidapi.com/dl?id=${videoId}`;
    
    try {
        statusText.innerText = "Converting video to high-quality audio file...";
        
        // We fetch using a direct cors-anywhere bridge if needed, or a public mirror
        const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(apiUrl)}`);
        
        if (!response.ok) throw new Error('Network response was not ok.');
        
        const wrapperData = await response.json();
        const data = JSON.parse(wrapperData.contents); // Parse the actual API response

        if (data.status === "ok" || data.link) {
            statusBox.classList.add('hidden');
            downloadBox.classList.remove('hidden');
            
            downloadLink.href = data.link;
            downloadLink.innerText = `Download "${data.title || 'Your MP3'}"`;
        } else {
            // Fallback strategy: If API acts up, redirect user to an embedded converter iframe safely
            statusText.innerText = "Redirecting to secure download stream...";
            setTimeout(() => {
                statusBox.classList.add('hidden');
                downloadBox.classList.remove('hidden');
                downloadLink.href = `https://loader.to/api/card/?url=${encodeURIComponent(urlInput)}&f=mp3`;
                downloadLink.innerText = "Click to Stream & Download MP3";
            }, 1500);
        }

    } catch (error) {
        // Ultimate fallback if the browser blocks the fetch entirely
        statusText.innerText = "Generating download link via backup stream...";
        setTimeout(() => {
            statusBox.classList.add('hidden');
            downloadBox.classList.remove('hidden');
            downloadLink.href = `https://loader.to/api/button/?url=${encodeURIComponent(urlInput)}&f=mp3`;
            downloadLink.innerText = "Download via Backup Server";
        }, 1000);
    }
}

    </script>
</body>
</html>
